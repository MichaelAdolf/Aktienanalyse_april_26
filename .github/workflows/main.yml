name: Daily Trading Mail (Aggressive)

on:
  schedule:
    # GitHub Actions läuft in UTC.
    # Wir triggern 04:00 und 05:00 UTC an Werktagen und lassen das Script nur senden,
    # wenn es lokal in Europe/Berlin wirklich 06:xx ist (DST-sicher).
    - cron: "0 4 * * 1-5"
    - cron: "0 5 * * 1-5"
  workflow_dispatch: {}

jobs:
  send_mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy pytz streamlit plotly ta

      - name: Run daily mail
        env:
          # Script-Optionen
          LOCAL_TZ: Europe/Berlin
          ENFORCE_6AM_LOCAL: "1"
          AUTO_LEARNED: "1"
          EVAL_DAYS: "61"
          MIN_CHANGE: "0.08"
          MAX_GAP_DAYS: "5"
        run: |
          python dailymail.py
